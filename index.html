            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .lang-btn:hover { background-color: #D4AF37; color: #0D47A1; transform: scale(1.05); }

        .hero {
            background: linear-gradient(135deg, #0D47A1, #1E88E5);

            text-align: center;
            color: white;
            margin-bottom: 2rem;

        .hero p { font-size: 1.2rem; max-width: 800px; margin: 0 auto; }

            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .city-card {
            background: white;

            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);

        .tag { background: #E3F2FD; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.75rem; color: #0D47A1; }

            margin-bottom: 1.5rem;
            border: 1px solid #E3F2FD;

        .item-card {
            background: white;
            padding: 1.2rem;
            border-radius: 15px;

            border-color: #D4AF37;

    let currentLang = 'ar';
    let currentCityId = null;
    let currentDetailId = null;

    function renderStars(rating) {
        const fullStars = Math.floor(rating);
        let stars = '';
        for (let i = 0; i < fullStars; i++) stars += '★';
        for (let i = 0; i < 5 - fullStars; i++) stars += '☆';
        return `<div class="stars">${stars} (${rating})</div>`;
    }

    function openDetailPage(detailId) {
        currentDetailId = detailId;
        const detail = detailsData[currentLang][detailId];
        if (!detail) return;
        const t = content[currentLang];
        const container = document.getElementById('detailPageContainer');
        container.innerHTML = `
            <div class="detail-page active-detail">
                <button class="back-btn" onclick="closeDetailPage()">🔙 ${t.backToCity}</button>
                <div class="detail-header"><h2>${detail.title}</h2></div>
                ${renderStars(detail.rating)}
                <div class="detail-info"><h3>📝 ${currentLang === 'ar' ? 'الوصف' : (currentLang === 'en' ? 'Description' : '描述')}</h3><p>${detail.desc}</p></div>
                <div class="detail-location"><h3>📍 ${currentLang === 'ar' ? 'الموقع' : (currentLang === 'en' ? 'Location' : '位置')}</h3><p>${detail.location}</p></div>
                <div class="detail-info"><h3>🚗 ${currentLang === 'ar' ? 'الاتجاهات' : (currentLang === 'en' ? 'Directions' : '路线')}</h3><p>${detail.directions}</p></div>
                <div class="detail-price">💰 ${detail.price}</div>
                <div class="detail-info"><h3>⏰ ${currentLang === 'ar' ? 'أفضل وقت' : (currentLang === 'en' ? 'Best Time' : '最佳时间')}</h3><p>${detail.bestTime}</p></div>
                <a href="${detail.mapLink}" target="_blank" class="map-link">🗺️ ${currentLang === 'ar' ? 'عرض على الخريطة' : (currentLang === 'en' ? 'View on Map' : '在地图上查看')}</a>
            </div>
        `;
        document.getElementById('cityPagesContainer').style.display = 'none';
        document.getElementById('mainPage').style.display = 'none';
    }

    function closeDetailPage() {
        currentDetailId = null;
        document.getElementById('detailPageContainer').innerHTML = '';
        if (currentCityId) {
            openCity(currentCityId);
        } else {
            document.getElementById('mainPage').style.display = 'block';
            document.getElementById('cityPagesContainer').style.display = 'block';
        }
    }

    function renderHome() {
        const grid = document.getElementById('citiesGrid');
        const t = content[currentLang];
        const cities = t.cities;
        grid.innerHTML = Object.keys(cities).map(key => {
            const city = cities[key];
            return `<div class="city-card" onclick="openCity('${key}')">
                        <div class="card-icon">${city.icon}</div>
                        <div class="card-content">
                            <h3>${city.name}</h3>
                            <p>${city.desc}</p>
                            <div class="city-tags">${city.highlights.slice(0,3).map(h => `<span class="tag">${h}</span>`).join('')}</div>
                        </div>
                    </div>`;
        }).join('');
        document.getElementById('mainPage').style.display = 'block';
        document.getElementById('cityPagesContainer').innerHTML = '';
        document.getElementById('detailPageContainer').innerHTML = '';
    }

    function openCity(cityKey) {
        currentCityId = cityKey;
        const t = content[currentLang];
        const city = t.cities[cityKey];
        const sections = t.sections;
        
        const container = document.getElementById('cityPagesContainer');
        container.innerHTML = `
            <div class="city-page active-page">
                <button class="back-btn" onclick="backHome()">🔙 ${t.backHome}</button>
                <div class="city-header"><h2>${city.name}</h2></div>
                
                <div class="section special-section"><h3>${sections.special} <span class="animated-icon">${city.icon}</span></h3><p>${city.special.desc}</p>

                        let detailKey = '';
                        if (cityKey === 'muscat') detailKey = 'special-fireworks';

                        else detailKey = 'special-khareef';

                <div class="section"><h3>${sections.cafes}</h3><div class="items-grid">${city.cafes.map(c => `<div class="item-card" onclick="openDetailPage('cafe-oman-coffee')"><h4>${c}</h4><p>${currentLang === 'ar' ? 'مقهى مميز' : (currentLang === 'en' ? 'Specialty cafe' : '特色咖啡馆')}</p>${renderStars(4.6)}</div>`).join('')}</div></div>

        `;
        document.getElementById('mainPage').style.display = 'none';
        document.getElementById('detailPageContainer').innerHTML = '';
        container.style.display = 'block';
    }

    function backHome() { 
        currentCityId = null;
        renderHome(); 
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        const t = content[lang];
        document.getElementById('heroTitle').innerHTML = t.heroTitle;
        document.getElementById('heroDesc').innerHTML = t.heroDesc;
        if (currentDetailId) {
            openDetailPage(currentDetailId);
        } else if (currentCityId) { 
            openCity(currentCityId); 
        } else { 
            renderHome(); 
        }
    }

    renderHome();
