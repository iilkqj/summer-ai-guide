    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            color: #1b5e20;
            line-height: 1.6;
            overflow-x: hidden;
        }
        body[dir="ltr"] { direction: ltr; text-align: left; }
        body[dir="rtl"] { direction: rtl; text-align: right; }

        /* Language Bar */
        .language-bar {
            background-color: #1a5c3e;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            flex-wrap: wrap;
            border-bottom: 3px solid #d4af37;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .lang-btn {
            background-color: #2e7d5e;
            color: #f5e6d3;
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .lang-btn:hover { background-color: #d4af37; color: #1a5c3e; transform: scale(1.05); }

        /* Hero Banner Slider */
        .hero-slider {
            position: relative;
            height: 70vh;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
        .slide.active {
            opacity: 1;
        }
        .slide-content {
            background: rgba(0,0,0,0.5);
            padding: 2rem;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }
        .slide-content h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .slide-content p {
            font-size: 1.3rem;
            max-width: 600px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .slider-dots {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 10;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .dot.active {
            background: #d4af37;
            transform: scale(1.3);
        }

        /* Cities Grid */
        .cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .city-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
        }
        .city-card:nth-child(1) { animation-delay: 0.1s; }
        .city-card:nth-child(2) { animation-delay: 0.2s; }
        .city-card:nth-child(3) { animation-delay: 0.3s; }
        .city-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card-icon {
            height: 200px;
            background: linear-gradient(135deg, #a5d6a7, #81c784);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            transition: transform 0.3s ease;
        }
        .city-card:hover .card-icon {
            transform: scale(1.05);
        }
        .card-content { padding: 1.5rem; }
        .card-content h3 { color: #1a5c3e; font-size: 1.6rem; margin-bottom: 0.5rem; }
        .card-content p { color: #2e7d5e; margin-bottom: 1rem; }
        .city-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .tag {
            background: #e8f5e9;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #1a5c3e;
            transition: all 0.3s;
        }
        .tag:hover {
            background: #d4af37;
            transform: translateY(-2px);
        }

        /* City Page */
        .city-page {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            display: none;
            animation: fadeInUp 0.5s ease;
        }
        .active-page { display: block; }
        .city-header { text-align: center; margin-bottom: 2rem; }
        .city-header h2 { font-size: 2.5rem; color: #1a5c3e; border-bottom: 4px solid #d4af37; display: inline-block; }
        .section {
            background: #fef8ef;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }
        .section:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .section h3 { color: #1a5c3e; font-size: 1.6rem; margin-bottom: 1rem; border-right: 5px solid #d4af37; padding-right: 1rem; }
        body[dir="ltr"] .section h3 { border-right: none; border-left: 5px solid #d4af37; padding-right: 0; padding-left: 1rem; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .item-card {
            background: white;
            padding: 1rem;
            border-radius: 15px;
            border: 1px solid #c8e6c9;
            transition: all 0.3s;
        }
        .item-card:hover {
            transform: translateY(-3px);
            border-color: #d4af37;
        }
        .item-card h4 { color: #1a5c3e; margin-bottom: 0.5rem; }
        .special-section { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border: 2px solid #d4af37; }
        .animated-icon {
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            font-size: 1.5rem;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .home-btn {
            background: #d4af37;
            color: #1a5c3e;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            margin: 1rem auto;
            display: inline-block;
            font-weight: bold;
            transition: all 0.3s;
        }
        .home-btn:hover {
            background: #1a5c3e;
            color: #d4af37;
            transform: scale(1.05);
        }
        .footer {
            background: #1a5c3e;
            color: #e8f5e9;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .slide-content h1 { font-size: 1.8rem; }
            .cities-grid { padding: 1rem; }
            .city-header h2 { font-size: 1.8rem; }
        }
    </style>

    function setLanguage(lang) {
        currentLang = lang;

        // Update slider texts
        document.getElementById('slide1Title').innerHTML = t.slide1Title;
        document.getElementById('slide1Desc').innerHTML = t.slide1Desc;
        document.getElementById('slide2Title').innerHTML = t.slide2Title;

        document.getElementById('slide3Title').innerHTML = t.slide3Title;
        document.getElementById('slide3Desc').innerHTML = t.slide3Desc;
        document.getElementById('footerText').innerHTML = t.footer;
        
        if (currentCityId) { openCity(currentCityId); }
        else { renderHome(); }
    }

    // Slider functionality
    function initSlider() {
        const slides = document.querySelectorAll('.slide');
        const dotsContainer = document.getElementById('sliderDots');
        
        slides.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (i === 0) dot.classList.add('active');
            dot.onclick = () => goToSlide(i);
            dotsContainer.appendChild(dot);
        });
        
        function goToSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                if (dotsContainer.children[i]) dotsContainer.children[i].classList.remove('active');
            });
            slides[index].classList.add('active');
            dotsContainer.children[index].classList.add('active');
            slideIndex = index;
        }
        
        function nextSlide() {
            let next = (slideIndex + 1) % slides.length;
            goToSlide(next);
        }
        
        slideInterval = setInterval(nextSlide, 5000);
        window.goToSlide = goToSlide;
    }

    renderHome();
    initSlider();
</script>
