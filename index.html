            justify-content: flex-end;
            gap: 1rem;
            flex-wrap: wrap;
            border-bottom: 3px solid #d4af37;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .lang-btn {
            background-color: #2e7d5e;
            color: #f5e6d3;
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .lang-btn:hover { background-color: #d4af37; color: #1a5c3e; transform: scale(1.05); }

        .hero {
            background: linear-gradient(135deg, #1a5c3e, #2e7d5e);
            padding: 4rem 2rem;
            text-align: center;
            color: white;
            margin-bottom: 2rem;

        .hero p { font-size: 1.2rem; max-width: 800px; margin: 0 auto; }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .city-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);

            height: 160px;
            background: linear-gradient(135deg, #a5d6a7, #81c784);

            align-items: center;
            justify-content: center;

        .tag { background: #e8f5e9; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.75rem; color: #1a5c3e; }

            max-width: 1200px;

            padding: 2rem;

            border-radius: 30px;
            display: none;

            background: #fef8ef;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .item-card {
            background: white;
            padding: 1rem;
            border-radius: 15px;

            transition: all 0.3s;

        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
        .home-btn, .back-to-city-btn {
            background: #d4af37; color: #1a5c3e; border: none; padding: 0.6rem 1.5rem;

            font-weight: bold;
        }

        .footer { background: #1a5c3e; color: #e8f5e9; text-align: center; padding: 1.5rem; margin-top: 2rem; }

        .detail-location { background: #e8f5e9; padding: 1rem; border-radius: 15px; margin: 1rem 0; }

            .hero h1 { font-size: 2rem; }

    function getCityName(city) { return city[`name${currentLang === 'ar' ? 'Ar' : (currentLang === 'en' ? 'En' : 'Zh')}`]; }
    function getCityDesc(city) { return city[`desc${currentLang === 'ar' ? 'Ar' : (currentLang === 'en' ? 'En' : 'Zh')}`]; }
    function getSpecialTitle(city) { return city.special[`title${currentLang === 'ar' ? 'Ar' : (currentLang === 'en' ? 'En' : 'Zh')}`]; }
    function getSpecialDesc(city) { return city.special[`desc${currentLang === 'ar' ? 'Ar' : (currentLang === 'en' ? 'En' : 'Zh')}`]; }

    function openDetailPage(detailId) {
        currentDetailId = detailId;
        const detail = detailsData[detailId];
        if (!detail) return;
        
        const t = detail[currentLang];
        const container = document.getElementById('detailPageContainer');
        container.innerHTML = `
            <div class="detail-page active-detail">
                <button class="back-to-city-btn" onclick="closeDetailPage()">${translations[currentLang].backToCity}</button>
                <div class="detail-header"><h2>${t.title}</h2></div>
                <div class="detail-info"><h3>📝 ${currentLang === 'ar' ? 'الوصف' : (currentLang === 'en' ? 'Description' : '描述')}</h3><p>${t.desc}</p></div>
                <div class="detail-location"><h3>📍 ${currentLang === 'ar' ? 'الموقع' : (currentLang === 'en' ? 'Location' : '位置')}</h3><p>${t.location}</p></div>
                <div class="detail-info"><h3>🚗 ${currentLang === 'ar' ? 'الاتجاهات' : (currentLang === 'en' ? 'Directions' : '路线')}</h3><p>${t.directions}</p></div>
                <div class="detail-price">💰 ${t.price}</div>
                <div class="detail-info"><h3>⏰ ${currentLang === 'ar' ? 'أفضل وقت' : (currentLang === 'en' ? 'Best Time' : '最佳时间')}</h3><p>${t.bestTime}</p></div>
            </div>
        `;
        document.getElementById('cityPagesContainer').style.display = 'none';
        document.getElementById('mainPage').style.display = 'none';
    }

    function closeDetailPage() {
        currentDetailId = null;
        document.getElementById('detailPageContainer').innerHTML = '';
        if (currentCityId) {
            openCity(currentCityId);
        } else {
            document.getElementById('mainPage').style.display = 'block';
            document.getElementById('cityPagesContainer').style.display = 'block';
        }
    }

    function renderHome() {
        const grid = document.getElementById('citiesGrid');
        grid.innerHTML = cityKeys.map(key => {
            const city = citiesData[key];
            return `<div class="city-card" onclick="openCity('${key}')">
                        <div class="card-icon">${city.icon}</div>
                        <div class="card-content">
                            <h3>${getCityName(city)}</h3>
                            <p>${getCityDesc(city)}</p>
                            <div class="city-tags">${city.highlights.slice(0,3).map(h => `<span class="tag">${h}</span>`).join('')}</div>
                        </div>
                    </div>`;
        }).join('');
        document.getElementById('mainPage').style.display = 'block';
        document.getElementById('cityPagesContainer').innerHTML = '';
        document.getElementById('detailPageContainer').innerHTML = '';
    }

    function openCity(cityKey) {
        currentCityId = cityKey;
        const city = citiesData[cityKey];
        const t = translations[currentLang];
        const container = document.getElementById('cityPagesContainer');
        
        // Map items to detail IDs
        const hotelIds = ["hotel-grand-hyatt-muscat", "hotel-shangrila-muscat", "hotel-crowne-plaza-muscat", "hotel-sheraton-muscat", "hotel-intercontinental-muscat"];
        const cafeIds = ["cafe-oman-coffee", "cafe-starbucks-qurum"];
        const landmarkIds = ["landmark-grand-mosque"];
        const foodIds = ["food-shuwa"];
        const storyIds = ["story-portuguese"];
        const customIds = ["custom-khanjar"];
        
        container.innerHTML = `
            <div class="city-page active-page">
                <div style="text-align:center"><button class="home-btn" onclick="backHome()">${t.backHome}</button></div>
                <div class="city-header"><h2>${getCityName(city)}</h2></div>
                <div class="section special-section"><h3>✨ ${getSpecialTitle(city)} <span class="animated-icon">${city.icon}</span></h3><p>${getSpecialDesc(city)}</p>
                    <div class="items-grid">${city.special.details.map((d, idx) => `<div class="item-card" onclick="openDetailPage('special-fireworks')"><h4>${d}</h4></div>`).join('')}</div>
                </div>
                <div class="section"><h3>${t.sections.landmarks}</h3><div class="items-grid">${city.landmarks.map((l, idx) => `<div class="item-card" onclick="openDetailPage('${landmarkIds[idx % landmarkIds.length]}')"><h4>${l.split(':')[0]}</h4><p>${l.split(':')[1] || ''}</p></div>`).join('')}</div></div>
                <div class="section"><h3>${t.sections.food}</h3><div class="items-grid">${city.food.map((f, idx) => `<div class="item-card" onclick="openDetailPage('${foodIds[idx % foodIds.length]}')"><h4>${f.split(':')[0]}</h4><p>${f.split(':')[1] || ''}</p></div>`).join('')}</div></div>
                <div class="section"><h3>${t.sections.stories}</h3><div class="items-grid">${city.stories.map((s, idx) => `<div class="item-card" onclick="openDetailPage('${storyIds[idx % storyIds.length]}')"><h4>${s.split(':')[0]}</h4><p>${s.split(':')[1] || ''}</p></div>`).join('')}</div></div>
                <div class="section"><h3>${t.sections.customs}</h3><div class="items-grid">${city.customs.map((c, idx) => `<div class="item-card" onclick="openDetailPage('${customIds[idx % customIds.length]}')"><h4>${c.split(':')[0]}</h4><p>${c.split(':')[1] || ''}</p></div>`).join('')}</div></div>
                <div class="section"><h3>${t.sections.hotels}</h3><div class="items-grid">${city.hotels.map((h, idx) => `<div class="item-card" onclick="openDetailPage('${hotelIds[idx % hotelIds.length]}')"><h4>${h}</h4><p>فندق 5 نجوم</p></div>`).join('')}</div></div>
                <div class="section"><h3>${t.sections.cafes}</h3><div class="items-grid">${city.cafes.map((c, idx) => `<div class="item-card" onclick="openDetailPage('${cafeIds[idx % cafeIds.length]}')"><h4>${c}</h4><p>مقهى مميز</p></div>`).join('')}</div></div>
            </div>
        `;
        document.getElementById('mainPage').style.display = 'none';
        document.getElementById('detailPageContainer').innerHTML = '';
        container.style.display = 'block';
    }

    function backHome() { 
        currentCityId = null;
        renderHome(); 
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        const t = translations[lang];
        document.getElementById('heroTitle').innerHTML = t.heroTitle;
        document.getElementById('heroDesc').innerHTML = t.heroDesc;
        if (currentDetailId) {
            openDetailPage(currentDetailId);
        } else if (currentCityId) { 
            openCity(currentCityId); 
        } else { 
            renderHome(); 
        }
    }

    renderHome();
</script>
