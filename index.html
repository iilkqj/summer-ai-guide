                <div class="detail-info"><h3>📝 ${currentLang === 'ar' ? 'الوصف' : (currentLang === 'en' ? 'Description' : '描述')}</h3><p>${t.desc}</p></div>
                <div class="detail-location"><h3>📍 ${currentLang === 'ar' ? 'الموقع' : (currentLang === 'en' ? 'Location' : '位置')}</h3><p>${t.location}</p></div>
                <div class="detail-info"><h3>🚗 ${currentLang === 'ar' ? 'الاتجاهات' : (currentLang === 'en' ? 'Directions' : '路线')}</h3><p>${t.directions}</p></div>
                <div class="detail-price">💰 ${t.price}</div>
                <div class="detail-info"><h3>⏰ ${currentLang === 'ar' ? 'أفضل وقت' : (currentLang === 'en' ? 'Best Time' : '最佳时间')}</h3><p>${t.bestTime}</p></div>
            </div>
        `;
        document.getElementById('cityPagesContainer').style.display = 'none';
        document.getElementById('mainPage').style.display = 'none';
    }

    function closeDetailPage() {
        currentDetailId = null;
        document.getElementById('detailPageContainer').innerHTML = '';
        if (currentCityId) {
            openCity(currentCityId);
        } else {
            document.getElementById('mainPage').style.display = 'block';
        }
    }

    function renderHome() {
        const grid = document.getElementById('citiesGrid');
        grid.innerHTML = cityKeys.map(key => {
            const city = citiesData[key];
            return `<div class="city-card" onclick="openCity('${key}')">
                        <div class="card-icon">${city.icon}</div>
                        <div class="card-content">
                            <h3>${getCityName(city)}</h3>
                            <p>${getCityDesc(city)}</p>
                            <div class="city-tags">${city.highlights.slice(0,3).map(h => `<span class="tag">${h}</span>`).join('')}</div>
                        </div>
                    </div>`;
        }).join('');
        document.getElementById('mainPage').style.display = 'block';
        document.getElementById('cityPagesContainer').innerHTML = '';
        document.getElementById('detailPageContainer').innerHTML = '';
    }

    function openCity(cityKey) {
        currentCityId = cityKey;
        const city = citiesData[cityKey];
        const t = translations[currentLang];
        const container = document.getElementById('cityPagesContainer');
        
        container.innerHTML = `
            <div class="city-page active-page">
                <button class="back-btn" onclick="backHome()">🔙 ${t.backHome}</button>
                <div class="city-header"><h2>${getCityName(city)}</h2></div>
                <div class="section special-section"><h3>✨ ${getSpecialTitle(city)} <span class="animated-icon">${city.icon}</span></h3><p>${getSpecialDesc(city)}</p>
                    <div class="items-grid">${city.special.details.map((d, idx) => `<div class="item-card" onclick="openDetailPage('special-fireworks')"><h4>${d}</h4></div>`).join('')}</div>
                </div>
                <div class="section"><h3>${t.sections.landmarks}</h3><div class="items-grid">${city.landmarks.map(l => `<div class="item-card"><h4>${l.split(':')[0]}</h4><p>${l.split(':')[1] || ''}</p></div>`).join('')}</div></div>
                <div class="section"><h3>${t.sections.food}</h3><div class="items-grid">${city.food.map(f => `<div class="item-card"><h4>${f.split(':')[0]}</h4><p>${f.split(':')[1] || ''}</p></div>`).join('')}</div></div>
                <div class="section"><h3>${t.sections.stories}</h3><div class="items-grid">${city.stories.map(s => `<div class="item-card"><h4>${s.split(':')[0]}</h4><p>${s.split(':')[1] || ''}</p></div>`).join('')}</div></div>
                <div class="section"><h3>${t.sections.customs}</h3><div class="items-grid">${city.customs.map(c => `<div class="item-card"><h4>${c.split(':')[0]}</h4><p>${c.split(':')[1] || ''}</p></div>`).join('')}</div></div>
                <div class="section"><h3>${t.sections.hotels}</h3><div class="items-grid">${city.hotels.map((h, idx) => `<div class="item-card" onclick="openDetailPage('hotel-grand-hyatt-muscat')"><h4>${h}</h4><p>${currentLang === 'ar' ? 'فندق 5 نجوم' : (currentLang === 'en' ? '5-star hotel' : '五星级酒店')}</p></div>`).join('')}</div></div>
                <div class="section"><h3>${t.sections.cafes}</h3><div class="items-grid">${city.cafes.map(c => `<div class="item-card"><h4>${c}</h4><p>${currentLang === 'ar' ? 'مقهى مميز' : (currentLang === 'en' ? 'Specialty cafe' : '特色咖啡馆')}</p></div>`).join('')}</div></div>
            </div>
        `;
        document.getElementById('mainPage').style.display = 'none';
        document.getElementById('detailPageContainer').innerHTML = '';
        container.style.display = 'block';
    }

    function backHome() { 
        currentCityId = null;
        renderHome(); 
    }

    function goBack() {
        if (currentDetailId) {
            closeDetailPage();
        } else if (currentCityId) {
            backHome();
        } else {
            window.history.back();
        }
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        const t = translations[lang];
        document.getElementById('heroTitle').innerHTML = t.heroTitle;
        document.getElementById('heroDesc').innerHTML = t.heroDesc;
        if (currentDetailId) {
            openDetailPage(currentDetailId);
        } else if (currentCityId) { 
            openCity(currentCityId); 
        } else { 
            renderHome(); 
        }
    }

    renderHome();
</script>
</body>
</html>
