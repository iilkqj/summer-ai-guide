            cursor: pointer;

            padding: 2rem;

            margin: 0 auto;

            .cities-grid { padding: 1rem; }

        ar: { heroTitle: "🌊 سمر | Summer", heroDesc: "مرشدك السياحي الذكي بالذكاء الاصطناعي | يغطي أفضل الوجهات في عُمان", backToCity: "🏠 العودة للمدينة", backHome: "🏠 العودة للرئيسية",

        en: { heroTitle: "🌊 Summer | Your AI Guide", heroDesc: "Your AI Smart Tourism Guide | Covers the best destinations in Oman", backToCity: "🏠 Back to City", backHome: "🏠 Back to Home",
              sections: { landmarks: "🏛️ Landmarks & Attractions", food: "🍽️ Traditional Food", stories: "📖 Historical Stories", customs: "🎭 Customs & Traditions", hotels: "🏨 Top 5 Hotels", cafes: "☕ Top 5 Cafes" } },
        zh: { heroTitle: "🌊 Summer | 您的AI导游", heroDesc: "您的AI智能旅游指南 | 覆盖阿曼最佳目的地", backToCity: "🏠 返回城市", backHome: "🏠 返回首页",
              sections: { landmarks: "🏛️ 地标与景点", food: "🍽️ 传统美食", stories: "📖 历史故事", customs: "🎭 习俗与传统", hotels: "🏨 最佳酒店", cafes: "☕ 最佳咖啡馆" } }
    };

    function getCityName(city) { return city[`name${currentLang === 'ar' ? 'Ar' : (currentLang === 'en' ? 'En' : 'Zh')}`]; }
    function getCityDesc(city) { return city[`desc${currentLang === 'ar' ? 'Ar' : (currentLang === 'en' ? 'En' : 'Zh')}`]; }
    function getSpecialTitle(city) { return city.special[`title${currentLang === 'ar' ? 'Ar' : (currentLang === 'en' ? 'En' : 'Zh')}`]; }
    function getSpecialDesc(city) { return city.special[`desc${currentLang === 'ar' ? 'Ar' : (currentLang === 'en' ? 'En' : 'Zh')}`]; }

    function renderStars(rating) {
        const fullStars = Math.floor(rating);
        let stars = '';
        for (let i = 0; i < fullStars; i++) stars += '★';
        for (let i = 0; i < 5 - fullStars; i++) stars += '☆';
        return `<div class="stars">${stars} (${rating})</div>`;
    }

    function openDetailPage(detailId) {
        currentDetailId = detailId;
        const detail = detailsData[detailId];
        if (!detail) return;
        const t = detail[currentLang];
        const trans = translations[currentLang];
        const container = document.getElementById('detailPageContainer');
        container.innerHTML = `
            <div class="detail-page active-detail">
                <button class="back-btn" onclick="closeDetailPage()">🔙 ${trans.backToCity}</button>
                <div class="detail-header"><h2>${t.title}</h2></div>
                ${renderStars(t.rating)}
                <div class="detail-info"><h3>📝 ${currentLang === 'ar' ? 'الوصف' : (currentLang === 'en' ? 'Description' : '描述')}</h3><p>${t.desc}</p></div>
                <div class="detail-location"><h3>📍 ${currentLang === 'ar' ? 'الموقع' : (currentLang === 'en' ? 'Location' : '位置')}</h3><p>${t.location}</p></div>
                <div class="detail-info"><h3>🚗 ${currentLang === 'ar' ? 'الاتجاهات' : (currentLang === 'en' ? 'Directions' : '路线')}</h3><p>${t.directions}</p></div>
                <div class="detail-price">💰 ${t.price}</div>
                <div class="detail-info"><h3>⏰ ${currentLang === 'ar' ? 'أفضل وقت' : (currentLang === 'en' ? 'Best Time' : '最佳时间')}</h3><p>${t.bestTime}</p></div>
                <a href="${t.mapLink}" target="_blank" class="map-link">🗺️ ${currentLang === 'ar' ? 'عرض على الخريطة' : (currentLang === 'en' ? 'View on Map' : '在地图上查看')}</a>
            </div>
        `;
        document.getElementById('cityPagesContainer').style.display = 'none';
        document.getElementById('mainPage').style.display = 'none';
    }

    function closeDetailPage() {
        currentDetailId = null;
        document.getElementById('detailPageContainer').innerHTML = '';
        if (currentCityId) {
            openCity(currentCityId);
        } else {
            document.getElementById('mainPage').style.display = 'block';
            document.getElementById('cityPagesContainer').style.display = 'block';
        }
    }

    function renderHome() {
        const grid = document.getElementById('citiesGrid');
        grid.innerHTML = cityKeys.map(key => {
            const city = citiesData[key];
            return `<div class="city-card" onclick="openCity('${key}')">
                        <div class="card-icon">${city.icon}</div>
                        <div class="card-content">
                            <h3>${getCityName(city)}</h3>
                            <p>${getCityDesc(city)}</p>
                            <div class="city-tags">${city.highlights.slice(0,3).map(h => `<span class="tag">${h}</span>`).join('')}</div>
                        </div>
                    </div>`;
        }).join('');
        document.getElementById('mainPage').style.display = 'block';
        document.getElementById('cityPagesContainer').innerHTML = '';
        document.getElementById('detailPageContainer').innerHTML = '';
    }

    function openCity(cityKey) {
        currentCityId = cityKey;
        const city = citiesData[cityKey];
        const t = translations[currentLang];
        const container = document.getElementById('cityPagesContainer');
        
        container.innerHTML = `
            <div class="city-page active-page">
                <button class="back-btn" onclick="backHome()">🔙 ${t.backHome}</button>
                <div class="city-header"><h2>${getCityName(city)}</h2></div>
                
                <div class="section special-section"><h3>✨ ${getSpecialTitle(city)} <span class="animated-icon">${city.icon}</span></h3><p>${getSpecialDesc(city)}</p>
                    <div class="items-grid">${city.special.details.map(d => `<div class="item-card" onclick="openDetailPage('special-fireworks')"><h4>${d}</h4></div>`).join('')}</div>
                </div>
                
                <div class="section"><h3>${t.sections.landmarks}</h3><div class="items-grid">${city.landmarks.map(l => `<div class="item-card" onclick="openDetailPage('landmark-grand-mosque')"><h4>${l}</h4><p>${currentLang === 'ar' ? 'معلم سياحي مميز' : (currentLang === 'en' ? 'Distinctive landmark' : '独特的地标')}</p>${renderStars(4.8)}</div>`).join('')}</div></div>
                
                <div class="section"><h3>${t.sections.food}</h3><div class="items-grid">${city.food.map(f => `<div class="item-card" onclick="openDetailPage('food-shuwa')"><h4>${f}</h4><p>${currentLang === 'ar' ? 'أكلة عمانية شهيرة - متوفرة في مطعم الأخطم' : (currentLang === 'en' ? 'Famous Omani dish - Available at Al Aktham Restaurant' : '著名的阿曼菜 - 可在Al Aktham餐厅享用')}</p>${renderStars(4.7)}</div>`).join('')}</div></div>
                
                <div class="section"><h3>${t.sections.stories}</h3><div class="items-grid">${city.stories.map(s => `<div class="item-card"><h4>${s.split(':')[0]}</h4><p>${s.split(':')[1] || ''}</p>${renderStars(4.9)}</div>`).join('')}</div></div>
                
                <div class="section"><h3>${t.sections.customs}</h3><div class="items-grid">${city.customs.map(c => `<div class="item-card"><h4>${c}</h4><p>${currentLang === 'ar' ? 'تراث عماني أصيل' : (currentLang === 'en' ? 'Authentic Omani heritage' : '正宗的阿曼遗产')}</p>${renderStars(4.8)}</div>`).join('')}</div></div>
                
                <div class="section"><h3>${t.sections.hotels}</h3><div class="items-grid">${city.hotels.map(h => `<div class="item-card" onclick="openDetailPage('hotel-grand-hyatt-muscat')"><h4>${h}</h4><p>${currentLang === 'ar' ? 'فندق 5 نجوم فاخر' : (currentLang === 'en' ? 'Luxury 5-star hotel' : '豪华五星级酒店')}</p>${renderStars(4.8)}</div>`).join('')}</div></div>
                
                <div class="section"><h3>${t.sections.cafes}</h3><div class="items-grid">${city.cafes.map(c => `<div class="item-card" onclick="openDetailPage('cafe-oman-coffee')"><h4>${c}</h4><p>${currentLang === 'ar' ? 'مقهى مميز يقدم القهوة العمانية' : (currentLang === 'en' ? 'Specialty cafe serving Omani coffee' : '供应阿曼咖啡的特色咖啡馆')}</p>${renderStars(4.6)}</div>`).join('')}</div></div>
            </div>
        `;
        document.getElementById('mainPage').style.display = 'none';
        document.getElementById('detailPageContainer').innerHTML = '';
        container.style.display = 'block';
    }

    function backHome() { 
        currentCityId = null;
        renderHome(); 
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        const t = translations[lang];
        document.getElementById('heroTitle').innerHTML = t.heroTitle;
        document.getElementById('heroDesc').innerHTML = t.heroDesc;
        if (currentDetailId) {
            openDetailPage(currentDetailId);
        } else if (currentCityId) { 
            openCity(currentCityId); 
        } else { 
            renderHome(); 
        }
    }

    renderHome();
</script>
</body>
</html>
