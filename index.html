// ===== LANGUAGE HELPERS =====
function getField(city, key){
    if(currentLang === 'ar') return city[key+"Ar"];
    if(currentLang === 'en') return city[key+"En"];
    return city[key+"Zh"];
}

function getSpecial(city, key){
    if(currentLang === 'ar') return city.special[key+"Ar"];
    if(currentLang === 'en') return city.special[key+"En"];
    return city.special[key+"Zh"];
}

// ===== RENDER =====
function renderHome() {
    const grid = document.getElementById('citiesGrid');

    grid.innerHTML = Object.keys(citiesData).map(key => {
        const city = citiesData[key];

        return `
        <div class="city-card" onclick="openCity('${key}')">
            <h3>${getField(city,'name')}</h3>
            <p>${getField(city,'desc')}</p>
            <div>
                ${getField(city,'highlights').map(h=>`<span>${h}</span>`).join('')}
            </div>
        </div>`;
    }).join('');
}

// ===== OPEN CITY =====
function openCity(key){
    const city = citiesData[key];

    const t = translations[currentLang];

    document.getElementById('cityPagesContainer').innerHTML = `
    <div>
        <button onclick="renderHome()">${t.backHome}</button>

        <h2>${getField(city,'name')}</h2>

        <h3>${getSpecial(city,'title')}</h3>
        <p>${getSpecial(city,'desc')}</p>

        <h3>${t.sections.landmarks}</h3>
        ${getField(city,'landmarks').map(i=>`<p>${i}</p>`).join('')}

        <h3>${t.sections.food}</h3>
        ${getField(city,'food').map(i=>`<p>${i}</p>`).join('')}

        <h3>${t.sections.stories}</h3>
        ${getField(city,'stories').map(i=>`<p>${i}</p>`).join('')}

        <h3>${t.sections.customs}</h3>
        ${getField(city,'customs').map(i=>`<p>${i}</p>`).join('')}

        <h3>${t.sections.hotels}</h3>
        ${getField(city,'hotels').map(i=>`<p>${i}</p>`).join('')}

        <h3>${t.sections.cafes}</h3>
        ${getField(city,'cafes').map(i=>`<p>${i}</p>`).join('')}
    </div>
    `;
}
</script>
